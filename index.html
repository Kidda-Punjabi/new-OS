/* ─── CALENDAR ──────────────────────────────────────────── */
function CalendarPage(props){
  var tasks=props.tasks;
  var setTasks=props.setTasks;
  var[viewDay,setViewDay]=useState(null);
  var[calFilt,setCalFilt]=useState(["G","GT","Ar","J","T"]);
  var[schedMode,setSchedMode]=useState(false);
  var[suggs,setSuggs]=useState([]);
  var[confirmed,setConfirmed]=useState({});
  var[refreshKey,setRefreshKey]=useState(0);

  var HOURS=[];for(var i=6;i<=20;i++)HOURS.push(i);

  /* Assign side-by-side columns to overlapping events so they don't stack */
  function layoutEvents(evs){
    if(!evs.length)return[];
    var sorted=evs.slice().sort(function(a,b){return a.s-b.s;});
    var cols=[];
    var result=[];
    for(var i=0;i<sorted.length;i++){
      var ev=sorted[i];
      var placed=false;
      for(var ci=0;ci<cols.length;ci++){
        if(cols[ci]<=ev.s){cols[ci]=ev.e;result.push({ev:ev,col:ci});placed=true;break;}
      }
      if(!placed){cols.push(ev.e);result.push({ev:ev,col:cols.length-1});}
    }
    var total=cols.length;
    return result.map(function(r){return{ev:r.ev,col:r.col,total:total};});
  }

  var meetingCount=EVENTS.filter(function(e){return["meeting","sales"].includes(e.ty);}).length;
  var deepH=Math.round(EVENTS.filter(function(e){return e.ti.includes("Deep Work")||e.ti.includes("Rewire")||e.ti.includes("Claude");}).reduce(function(a,e){return a+(e.e-e.s);},0)/60);

  function getFreeSlots(d){
    var busy=EVENTS.filter(function(e){return e.d===d;}).sort(function(a,b){return a.s-b.s;});
    var slots=[];var cursor=480;
    for(var i=0;i<busy.length;i++){var b=busy[i];if(b.s>cursor&&b.s-cursor>=30)slots.push({s:cursor,e:b.s,dur:b.s-cursor});cursor=Math.max(cursor,b.e);}
    if(cursor<1020&&1020-cursor>=30)slots.push({s:cursor,e:1020,dur:1020-cursor});
    return slots;
  }

  function generateSuggs(){
    var open=tasks.filter(function(t){return t.st!=="Done";});
    var slotsMap={};
    DATES.slice(1,5).forEach(function(d){slotsMap[d]=getFreeSlots(d).map(function(s){return Object.assign({},s);});});
    var result=[];
    for(var i=0;i<open.length;i++){
      var task=open[i];var est=task.est||30;
      for(var j=1;j<5;j++){
        var d=DATES[j];
        var slot=slotsMap[d].find(function(s){return s.dur>=est;});
        if(slot&&!result.find(function(r){return r.tid===task.id;})){
          result.push({tid:task.id,tname:task.n,date:d,dayLabel:DAY_NAMES[j],start:slot.s,end:slot.s+est,est:est,own:task.own,pr:task.pr});
          slot.s+=est;slot.dur-=est;break;
        }
      }
    }
    setSuggs(result);setSchedMode(true);
  }

  function confirmSug(tid){
    var sug=suggs.find(function(s){return s.tid===tid;});if(!sug)return;
    setConfirmed(function(prev){var n=Object.assign({},prev);n[tid]=true;return n;});
    setTasks(function(prev){return prev.map(function(t){return t.id===tid?Object.assign({},t,{st:"In progress",sch:DAY_NAMES[DATES.indexOf(sug.date)].slice(0,3)+" "+m2t(sug.start)}):t;});});
  }

  function confirmAll(){suggs.forEach(function(s){confirmSug(s.tid);});setSchedMode(false);}

  var visEvts=EVENTS.filter(function(e){return calFilt.includes(e.cal);});

  /* render */
  return h('div',{style:{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",height:"100%"}},

    /* toolbar */
    h('div',{style:{padding:"8px 14px",background:"#fff",borderBottom:"1px solid #e8eaf0",display:"flex",flexDirection:"column",gap:6,flexShrink:0}},
      /* row 1 — calendar toggles + actions */
      h('div',{style:{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}},
        /* Gurupma section */
        h('span',{style:{fontSize:9,fontWeight:600,color:"#c5cae9",textTransform:"uppercase",letterSpacing:".06em",marginRight:2}},"Gurupma"),
        [
          {id:"G",  label:"Kidda",        col:BL,       bg:"#eef2ff"},
          {id:"GT", label:"gTeam Academy",col:"#0d9488",bg:"#f0fdfa"},
        ].map(function(cal){
          var on=calFilt.includes(cal.id);
          return h('button',{key:cal.id,
            onClick:function(){setCalFilt(function(prev){return on?prev.filter(function(x){return x!==cal.id;}):[].concat(prev,[cal.id]);});},
            style:{fontSize:10,padding:"3px 10px",borderRadius:20,cursor:"pointer",
                   border:"1px solid "+(on?cal.col:"#e8eaf0"),
                   background:on?cal.bg:"#fff",color:on?cal.col:GR,fontWeight:on?600:400,
                   display:"flex",alignItems:"center",gap:4}},
            h('span',{style:{width:7,height:7,borderRadius:"50%",background:on?cal.col:"#d0d3e8",display:"inline-block",flexShrink:0}}),
            cal.label
          );
        }),
        /* divider */
        h('div',{style:{width:1,height:18,background:"#e8eaf0",margin:"0 4px"}}),
        /* Tutors section */
        h('span',{style:{fontSize:9,fontWeight:600,color:"#c5cae9",textTransform:"uppercase",letterSpacing:".06em",marginRight:2}},"Tutors"),
        [
          {id:"Ar",label:"Arshdeep",col:GN,       bg:"#f0fdf4"},
          {id:"J", label:"Jasleen",  col:"#e8590c",bg:"#fff4e6"},
          {id:"T", label:"Tarnjot",  col:"#9c36b5",bg:"#f8f0fc"},
        ].map(function(cal){
          var on=calFilt.includes(cal.id);
          return h('button',{key:cal.id,
            onClick:function(){setCalFilt(function(prev){return on?prev.filter(function(x){return x!==cal.id;}):[].concat(prev,[cal.id]);});},
            style:{fontSize:10,padding:"3px 10px",borderRadius:20,cursor:"pointer",
                   border:"1px solid "+(on?cal.col:"#e8eaf0"),
                   background:on?cal.bg:"#fff",color:on?cal.col:GR,fontWeight:on?600:400,
                   display:"flex",alignItems:"center",gap:4}},
            h('span',{style:{width:7,height:7,borderRadius:"50%",background:on?cal.col:"#d0d3e8",display:"inline-block",flexShrink:0}}),
            cal.label
          );
        }),
        /* all / none shortcuts */
        h('div',{style:{marginLeft:4,display:"flex",gap:3}},
          h('button',{onClick:function(){setCalFilt(["G","GT","Ar","J","T"]);},
            style:{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #e8eaf0",background:"#f5f6fa",color:GR,cursor:"pointer"}},"All"),
          h('button',{onClick:function(){setCalFilt([]);},
            style:{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #e8eaf0",background:"#f5f6fa",color:GR,cursor:"pointer"}},"None")
        ),
        /* actions flush right */
        h('div',{style:{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}},
          h('button',{
            onClick:function(){setRefreshKey(function(k){return k+1;});},
            title:"Refresh calendar",
            style:{fontSize:11,padding:"4px 9px",borderRadius:6,border:"1px solid #e8eaf0",background:"#fff",color:GR,cursor:"pointer",display:"flex",alignItems:"center",gap:4}
          },
            h('svg',{viewBox:"0 0 20 20",fill:"none",stroke:"currentColor",strokeWidth:1.5,width:12,height:12},h('path',{d:"M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"})),
            "Refresh"
          ),
          h('button',{onClick:generateSuggs,style:{fontSize:11,padding:"4px 12px",borderRadius:6,cursor:"pointer",border:"1px solid "+AM,background:"#fff",color:AM,fontWeight:600}},"Schedule tasks →"),
          h('a',{href:"https://calendar.google.com",target:"_blank",style:{fontSize:11,padding:"4px 9px",borderRadius:6,border:"1px solid #e8eaf0",background:"#fff",color:BL,fontWeight:500,textDecoration:"none"}},"Google Calendar →")
        )
      )
    ),

    /* analysis strip */
    h('div',{style:{display:"flex",gap:6,padding:"8px 14px",background:"#fff",borderBottom:"1px solid #f0f2f7",flexShrink:0,overflowX:"auto"}},
      [[meetingCount+" events","Meetings this week",AM,"#fff8e1"],
       [deepH+"h","Deep work scheduled",RD,"#fff5f5"],
       ["~14h","Free slots Tue–Fri",GN,"#f0fdf4"],
       [EVENTS.filter(function(e){return e.d==="08";}).length+" events","Wed is busiest",BL,"#eef2ff"],
      ].map(function(item,i){
        return h('div',{key:i,style:{borderRadius:7,padding:"7px 12px",flexShrink:0,background:item[3],minWidth:110}},
          h('div',{style:{fontSize:9,color:GR,fontWeight:500,textTransform:"uppercase",letterSpacing:".04em",marginBottom:3}},item[1]),
          h('div',{style:{fontSize:15,fontWeight:500,color:item[2],marginBottom:2}},item[0])
        );
      })
    ),

    /* schedule banner */
    schedMode&&h('div',{style:{padding:"10px 14px",background:"#eef2ff",borderBottom:"1px solid #c5d7ff",flexShrink:0}},
      h('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}},
        h('div',null,
          h('div',{style:{fontSize:12,fontWeight:500,color:BL,marginBottom:2}},suggs.length+" tasks placed into free slots"),
          h('div',{style:{fontSize:11,color:GR}},"Deep Work and meetings protected. Click individual Add or confirm all.")
        ),
        h('div',{style:{display:"flex",gap:6}},
          h('button',{onClick:confirmAll,style:{fontSize:11,padding:"6px 14px",borderRadius:7,border:"1px solid "+GN,background:GN,color:"#fff",fontWeight:500,cursor:"pointer"}},"Confirm all + add to calendar"),
          h('button',{onClick:function(){setSchedMode(false);},style:{fontSize:11,padding:"6px 14px",borderRadius:7,border:"1px solid #e8eaf0",background:"#fff",color:GR,cursor:"pointer"}},"Dismiss")

/* ─── CONVERSATIONS PAGE ─────────────────────────────────── */
function ConversationsPage(){
  var[list,setList]=useState([]);
  var[loading,setLoading]=useState(false);
  var[loadingMore,setLoadingMore]=useState(false);
  var[loadingAll,setLoadingAll]=useState(false);
  var[err,setErr]=useState('');
  var[filter,setFilter]=useState('all');
  var[search,setSearch]=useState('');
  var[sel,setSel]=useState(null);
  var[msgs,setMsgs]=useState([]);
  var[mLoading,setML]=useState(false);
  var[txt,setTxt]=useState('');
  var[sending,setSending]=useState(false);
  var[sendSt,setSendSt]=useState('');
  var[unread,setUnread]=useState(0);
  var[nextCursor,setNextCursor]=useState(null);
  var[total,setTotal]=useState(0);
  var endRef=useRef(null);

  var loadConvos=useCallback(async function(){
    setLoading(true);setErr('');setList([]);setNextCursor(null);setTotal(0);
    try{
      var d=await ghlApi('GET','/conversations/search?locationId='+LOC+'&limit=100');
      var l=d.conversations||[];
      setList(l);
      setTotal(d.total||d.meta?.total||l.length);
      setNextCursor(d.meta?.nextCursor||d.meta?.startAfter||d.nextCursor||null);
      setUnread(l.filter(function(c){return c.unreadCount>0||c.unread;}).length);
    }catch(e){setErr(e.message);}
    setLoading(false);
  },[]);

  var loadMore=useCallback(async function(){
    if(!nextCursor)return;
    setLoadingMore(true);
    try{
      var d=await ghlApi('GET','/conversations/search?locationId='+LOC+'&limit=100&startAfter='+encodeURIComponent(nextCursor));
      var l=d.conversations||[];
      setList(function(prev){
        var combined=prev.concat(l);
        setUnread(combined.filter(function(c){return c.unreadCount>0||c.unread;}).length);
        return combined;
      });
      setNextCursor(d.meta?.nextCursor||d.meta?.startAfter||d.nextCursor||null);
    }catch(e){setErr(e.message);}
    setLoadingMore(false);
  },[nextCursor]);

  var loadAll=useCallback(async function(){
    setLoadingAll(true);setErr('');
    try{
      var all=list.slice();
      var cursor=nextCursor;
      var safety=20;
      while(cursor&&safety-->0){
        var d=await ghlApi('GET','/conversations/search?locationId='+LOC+'&limit=100&startAfter='+encodeURIComponent(cursor));
        var l=d.conversations||[];
        all=all.concat(l);
        cursor=d.meta?.nextCursor||d.meta?.startAfter||d.nextCursor||null;
        if(!l.length)break;
      }
      setList(all);
      setNextCursor(null);
      setUnread(all.filter(function(c){return c.unreadCount>0||c.unread;}).length);
    }catch(e){setErr(e.message);}
    setLoadingAll(false);
  },[list,nextCursor]);

  var openThread=useCallback(async function(c){
    setSel(c);setMsgs([]);setML(true);setSendSt('');
    try{
      // Fetch full conversation to ensure we have contactId
      var cv=await ghlApi('GET','/conversations/'+c.id);
      var full=cv.conversation||cv;
      // Merge any extra fields (contactId etc.) back onto sel
      setSel(function(prev){return Object.assign({},prev,{contactId:full.contactId||full.contact?.id||prev.contactId});});
      var d=await ghlApi('GET','/conversations/'+c.id+'/messages?limit=30');
      // GHL can return messages in multiple formats:
      // { messages: { messages: [...] } } or { messages: [...] } or top-level array
      var raw=[];
      if(Array.isArray(d)){raw=d;}
      else if(d.messages){
        if(Array.isArray(d.messages)){raw=d.messages;}
        else if(d.messages.messages&&Array.isArray(d.messages.messages)){raw=d.messages.messages;}
        else{raw=Object.values(d.messages);}
      }else if(d.conversations){raw=Array.isArray(d.conversations)?d.conversations:Object.values(d.conversations);}
      setMsgs(raw.sort(function(a,b){return new Date(a.dateAdded)-new Date(b.dateAdded);}));
    }catch(e){setMsgs([]);}
    setML(false);
  },[]);

  useEffect(function(){if(endRef.current)endRef.current.scrollIntoView({behavior:'smooth'});},[msgs]);

  async function sendMsg(){
    if(!sel||!txt.trim())return;
    setSending(true);setSendSt('');
    try{
      // GHL requires contactId — get it from the selected conversation
      var contactId=sel.contactId||sel.contact?.id||null;
      if(!contactId){
        // Try fetching the conversation to get contactId if not already on the object
        var cv=await ghlApi('GET','/conversations/'+sel.id);
        contactId=(cv.conversation||cv).contactId||(cv.conversation||cv).contact?.id||null;
      }
      var payload={type:'SMS',conversationId:sel.id,message:txt.trim()};
      if(contactId)payload.contactId=contactId;
      await ghlApi('POST','/conversations/messages',payload);
      setTxt('');setSendSt('ok');setTimeout(function(){openThread(sel);},900);
    }catch(e){setSendSt('err:'+e.message);}
    setSending(false);
  }

  var filtered=list.filter(function(c){
    if(filter==='unread'&&!(c.unreadCount>0||c.unread))return false;
    if(search&&!(c.contactName||c.id||'').toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  var sp=h('div',{style:{width:11,height:11,border:'1.5px solid #c5cae9',borderTopColor:BL,borderRadius:'50%',animation:'spin .7s linear infinite',flexShrink:0}});

  return h('div',{style:{display:'flex',flex:1,overflow:'hidden'}},
    /* LIST PANE */
    h('div',{style:{width:272,minWidth:272,borderRight:'1px solid #e8eaf0',display:'flex',flexDirection:'column',overflow:'hidden',background:'#fff'}},
      h('div',{style:{padding:'9px 12px',borderBottom:'1px solid #e8eaf0',flexShrink:0}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:7}},
          h('span',{style:{fontSize:13,fontWeight:500,color:'#1a1a2e'}},'Conversations'),
          h('button',{onClick:loadConvos,style:{fontSize:11,padding:'3px 8px',borderRadius:6,border:'1px solid #e8eaf0',background:'#f5f6fa',color:GR,cursor:'pointer',display:'flex',alignItems:'center',gap:4}},
            loading?sp:'↺',loading?'Loading…':'Refresh')
        ),
        h('input',{value:search,onChange:function(e){setSearch(e.target.value);},placeholder:'Search contacts…',style:{width:'100%',fontSize:12,padding:'5px 9px',borderRadius:6,border:'1px solid #e8eaf0',background:'#f9fafb',color:'#1a1a2e',outline:'none',marginBottom:6}}),
        h('div',{style:{display:'flex',gap:4}},
          h('button',{onClick:function(){setFilter('all');},style:{fontSize:11,padding:'3px 9px',borderRadius:20,cursor:'pointer',border:'1px solid '+(filter==='all'?'#1a1a2e':'#e8eaf0'),background:filter==='all'?'#1a1a2e':'#fff',color:filter==='all'?'#fff':GR,fontWeight:500}},'All'+(list.length?' ('+list.length+')':'')),
          h('button',{onClick:function(){setFilter('unread');},style:{fontSize:11,padding:'3px 9px',borderRadius:20,cursor:'pointer',border:'1px solid '+(filter==='unread'?RD:'#e8eaf0'),background:filter==='unread'?RD:'#fff',color:filter==='unread'?'#fff':GR,fontWeight:500}},unread>0?'Unread ('+unread+')':'Unread')
        )
      ),
      list.length>0&&h('div',{style:{display:'flex',gap:8,padding:'5px 12px',background:'#fff',borderBottom:'1px solid #f5f6fa',flexShrink:0}},
        h('span',{style:{fontSize:10,color:GR,display:'flex',alignItems:'center',gap:3}},h('div',{style:{width:5,height:5,borderRadius:'50%',background:GR}}),list.length+(total>list.length?' of '+total:'')+' loaded'),
        unread>0&&h('span',{style:{fontSize:10,color:RD,display:'flex',alignItems:'center',gap:3}},h('div',{style:{width:5,height:5,borderRadius:'50%',background:RD}}),unread+' unread')
      ),
      err&&h('div',{style:{padding:'7px 12px',fontSize:11,color:RD,background:'#fff5f5',margin:'5px 12px',borderRadius:6}},'Error: '+err),
      !loading&&list.length===0&&!err&&h('button',{onClick:loadConvos,style:{margin:'12px',padding:'8px 13px',borderRadius:6,border:'1px solid #e8eaf0',background:'#f9fafb',color:GR,fontSize:12,cursor:'pointer',fontWeight:500,textAlign:'center'}},'Load conversations →'),
      loading&&h('div',{style:{display:'flex',alignItems:'center',gap:7,padding:'12px',color:GR,fontSize:12}},sp,'Loading conversations…'),
      h('div',{style:{flex:1,overflowY:'auto'}},
        filtered.length===0&&!loading&&list.length>0&&h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,color:GR,gap:6}},
          h('div',{style:{fontSize:24,opacity:.3}},filter==='unread'?'✓':'🔍'),
          h('div',{style:{fontSize:12}},filter==='unread'?'No unread conversations':'No results')
        ),
        filtered.map(function(c){
          var name=c.contactName||c.id||'Unknown';
          var isU=c.unreadCount>0||c.unread;
          var isSel=sel&&sel.id===c.id;
          var ch=chInf(c.type);
          return h('div',{key:c.id,onClick:function(){openThread(c);},style:{display:'flex',alignItems:'center',gap:8,padding:isU?'8px 12px 8px 14px':'8px 12px',borderBottom:'0.5px solid #f5f6fa',cursor:'pointer',background:isSel?'#eef2ff':'#fff',position:'relative'}},
            isU&&h('div',{style:{width:6,height:6,borderRadius:'50%',background:RD,position:'absolute',left:4,top:'50%',transform:'translateY(-50%)'}}),
            h('div',{style:{width:32,height:32,borderRadius:'50%',background:aColGHL(name),display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600,color:'#fff',flexShrink:0}},iniGHL(name)),
            h('div',{style:{flex:1,minWidth:0}},
              h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:3}},
                h('div',{style:{fontSize:12,fontWeight:isU?700:500,color:'#1a1a2e',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},name),
                isU?h('span',{style:{fontSize:9,background:RD,color:'#fff',padding:'1px 5px',borderRadius:8,fontWeight:500,flexShrink:0}},c.unreadCount||'●'):h('span',{style:{fontSize:10,color:GR,flexShrink:0}},fmtRel(c.lastMessageDate))
              ),
              h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:1}},
                h('div',{style:{fontSize:11,color:GR,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}},
                  (c.lastMessageBody&&c.lastMessageBody.trim())
                    ? c.lastMessageBody
                    : (c.lastMessageType&&c.lastMessageType.toLowerCase().includes('call'))
                      ? '📞 Phone call'
                      : '📎 Attachment'
                ),
                isU&&h('span',{style:{fontSize:10,color:GR,flexShrink:0,marginLeft:4}},fmtRel(c.lastMessageDate))
              ),
              c.type&&h('span',{style:{fontSize:9,padding:'1px 5px',borderRadius:3,fontWeight:500,background:ch.bg,color:ch.c,marginTop:2,display:'inline-block'}},ch.l)
            )
          );
        }),
        /* LOAD MORE / LOAD ALL */
        nextCursor&&!loadingMore&&!loadingAll&&h('div',{style:{padding:'8px 12px',borderTop:'1px solid #f5f6fa',display:'flex',gap:6}},
          h('button',{onClick:loadMore,style:{flex:1,padding:'6px 10px',borderRadius:6,border:'1px solid #e8eaf0',background:'#f9fafb',color:GR,fontSize:11,cursor:'pointer',fontWeight:500}},'Load more (+100)'),
          h('button',{onClick:loadAll,style:{flex:1,padding:'6px 10px',borderRadius:6,border:'1px solid #e8eaf0',background:'#f9fafb',color:BL,fontSize:11,cursor:'pointer',fontWeight:500}},'Load all →')
        ),
        (loadingMore||loadingAll)&&h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:7,padding:'10px 12px',color:GR,fontSize:11}},
          sp,loadingAll?'Loading all conversations…':'Loading more…'
        )
      )
    ),
    /* THREAD PANE */
    h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'#fff'}},
      !sel
        ?h('div',{style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:7,color:GR,padding:24}},
            h('div',{style:{fontSize:28,opacity:.3}},'💬'),
            h('div',{style:{fontSize:13,fontWeight:500,color:'#1a1a2e'}},'Select a conversation'),
            h('div',{style:{fontSize:11,marginTop:3}},'Choose from the list to read and reply')
          )
        :h(React.Fragment,null,
            h('div',{style:{padding:'10px 14px',borderBottom:'1px solid #e8eaf0',display:'flex',alignItems:'center',gap:8,flexShrink:0}},
              h('div',{style:{width:33,height:33,borderRadius:'50%',background:aColGHL(sel.contactName||''),display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,color:'#fff',flexShrink:0}},iniGHL(sel.contactName||sel.id||'?')),
              h('div',{style:{flex:1}},
                h('div',{style:{fontSize:14,fontWeight:500,color:'#1a1a2e'}},sel.contactName||sel.id||'Unknown'),
                h('div',{style:{fontSize:11,color:GR,marginTop:1}},(sel.type?chInf(sel.type).l+' conversation':'Conversation')+(sel.unreadCount>0?' · '+sel.unreadCount+' unread':''))
              ),
              sel.contactId&&h('a',{href:'https://app.gohighlevel.com/v2/location/'+LOC+'/contacts/detail/'+sel.contactId,target:'_blank',style:{fontSize:11,padding:'3px 9px',borderRadius:6,border:'1px solid #e8eaf0',background:'#f5f6fa',color:BL,textDecoration:'none',whiteSpace:'nowrap'}},'View in GHL →')
            ),
            h('div',{style:{flex:1,overflowY:'auto',padding:'10px 14px',display:'flex',flexDirection:'column',gap:7}},
              mLoading&&h('div',{style:{display:'flex',justifyContent:'center',alignItems:'center',gap:7,paddingTop:20,color:GR,fontSize:12}},sp,'Loading…'),
              !mLoading&&msgs.length===0&&h('div',{style:{textAlign:'center',color:GR,fontSize:12,paddingTop:20}},'No messages yet.'),
              msgs.map(function(m,i){
                var out=m.direction==='outbound';
                // GHL stores message content in body — confirmed from debug raw
                // Handle \n literal escape sequences from GHL API
                var rawBody=m.body||m.text||m.content||
                  (m.meta&&(m.meta.content||m.meta.body||m.meta.text||m.meta.message))||
                  (m.contentAttributes&&(m.contentAttributes.content||m.contentAttributes.body))||
                  m.message||m.html||'';
                // Replace literal \n escape sequences with real newlines
                var bodyText=rawBody?rawBody.replace(/\\n/g,'\n').replace(/\\t/g,'\t'):'';
                // Strip HTML tags if present
                if(bodyText&&bodyText.indexOf('<')>-1){
                  var tmp=document.createElement('div');tmp.innerHTML=bodyText;bodyText=tmp.textContent||tmp.innerText||bodyText;
                }
                var attachments=m.attachments||(m.meta&&m.meta.attachments)||[];
                var mediaUrl=m.mediaUrl||(m.meta&&m.meta.mediaUrl)||null;
                var hasText=bodyText&&bodyText.trim().length>0;
                var hasAttachments=Array.isArray(attachments)&&attachments.length>0;
                // GHL uses numeric types: 1=SMS inbound, 2=SMS outbound, 3=Email, etc.
                var msgType=m.messageType||m.type||'';
                var typeLabel='';
                if(!hasText&&!hasAttachments&&!mediaUrl){
                  var tStr=String(msgType).toLowerCase();
                  if(tStr==='4'||tStr.includes('call'))typeLabel='📞 Phone call';
                  else if(tStr==='3'||tStr.includes('email'))typeLabel='📧 Email (no body)';
                  else if(tStr.includes('voicemail'))typeLabel='📱 Voicemail';
                  else if(tStr.includes('activity')||tStr.includes('note'))typeLabel='📋 Activity';
                  else typeLabel='[type '+msgType+']';
                }
                return h('div',{key:m.id||i,style:{display:'flex',justifyContent:out?'flex-end':'flex-start'}},
                  h('div',{style:{maxWidth:'72%',padding:'8px 12px',borderRadius:13,fontSize:13,lineHeight:1.5,wordBreak:'break-word',background:out?BL:'#f0f2f7',color:out?'#fff':'#1a1a2e',borderBottomRightRadius:out?3:13,borderBottomLeftRadius:out?13:3}},
                    hasText&&h('div',{style:{whiteSpace:'pre-wrap'}},bodyText),
                    mediaUrl&&h('div',{style:{marginTop:hasText?6:0}},
                      h('a',{href:mediaUrl,target:'_blank',style:{color:out?'#b3c9ff':'#3b5bdb',fontSize:12,textDecoration:'underline'}},'📎 View attachment')
                    ),
                    hasAttachments&&h('div',{style:{marginTop:hasText?6:0,display:'flex',flexDirection:'column',gap:4}},
                      attachments.map(function(att,ai){
                        var attUrl=att.url||att.fileUrl||att.mediaUrl||(typeof att==='string'?att:'');
                        var attName=att.name||att.fileName||att.title||'Attachment '+(ai+1);
                        var isImg=attUrl&&/\.(jpg|jpeg|png|gif|webp)/i.test(attUrl);
                        return h('div',{key:ai},
                          isImg
                            ?h('img',{src:attUrl,alt:attName,style:{maxWidth:'100%',borderRadius:6,display:'block'},onError:function(e){e.target.style.display='none';}})
                            :h('a',{href:attUrl,target:'_blank',style:{color:out?'#b3c9ff':'#3b5bdb',fontSize:12,textDecoration:'underline'}},'📎 '+attName)
                        );
                      })
                    ),
                    !hasText&&!hasAttachments&&!mediaUrl&&h('div',{style:{color:out?'rgba(255,255,255,0.7)':'#9ca3af',fontSize:12,fontStyle:'italic'}},typeLabel),
                    h('div',{style:{fontSize:10,opacity:.55,marginTop:4}},fmtFull(m.dateAdded))
                  )
                );
              }),
              h('div',{ref:endRef})
            ),
            sendSt==='ok'&&h('div',{style:{fontSize:11,padding:'5px 14px',background:'#f0fdf4',color:GN,borderTop:'1px solid #b2f2bb',flexShrink:0}},'✓ Message sent'),
            sendSt.startsWith('err')&&h('div',{style:{fontSize:11,padding:'5px 14px',background:'#fff5f5',color:RD,borderTop:'1px solid #ffc9c9',flexShrink:0}},sendSt.replace('err:','')),
            h('div',{style:{padding:'9px 14px',borderTop:'1px solid #e8eaf0',display:'flex',gap:7,alignItems:'flex-end',flexShrink:0}},
              h('textarea',{value:txt,onChange:function(e){setTxt(e.target.value);},onKeyDown:function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}},placeholder:'Type a message… (Enter to send)',rows:1,style:{flex:1,fontSize:13,padding:'7px 10px',borderRadius:6,border:'1px solid #e8eaf0',background:'#f9fafb',color:'#1a1a2e',outline:'none',resize:'none',minHeight:38,maxHeight:90,fontFamily:'inherit'}}),
              h('button',{onClick:sendMsg,disabled:sending||!txt.trim(),style:{padding:'7px 14px',borderRadius:6,border:'none',background:sending||!txt.trim()?'#e8eaf0':BL,color:sending||!txt.trim()?GR:'#fff',fontSize:12,fontWeight:500,cursor:sending||!txt.trim()?'not-allowed':'pointer',flexShrink:0,minWidth:50}},
                sending?sp:'Send'
              )
            )
          )
    )
  );
}

function SOPsPage(){
  var[pilFilt,setPilFilt]=useState("all");
  var[relFilt,setRelFilt]=useState("all");
  var[osFilt,setOsFilt]=useState("all");
  var[search,setSearch]=useState("");

  var filtered=SOP_DATA.filter(function(s){
    if(pilFilt!=="all"&&s.pillar!==pilFilt)return false;
    if(relFilt!=="all"&&s.rel!==relFilt)return false;
    if(osFilt==="os"&&!s.os)return false;
    if(osFilt==="notion"&&s.os)return false;
    if(search){var q=search.toLowerCase();if(s.name.toLowerCase().indexOf(q)<0&&s.desc.toLowerCase().indexOf(q)<0)return false;}
    return true;
  });

  var pillarCol={Acquisition:BL,Operations:AM,Delivery:GN};
  var pillarBg={Acquisition:"#eef2ff",Operations:"#fff8e1",Delivery:"#f0fdf4"};

  function filterBtn(val,cur,set,label,col,bg){
    var on=cur===val;
    return h('button',{onClick:function(){set(val);},style:{fontSize:10,padding:"3px 10px",borderRadius:20,cursor:"pointer",border:"1px solid "+(on?(col||"#1a1a2e"):"#e8eaf0"),background:on?(bg||"#1a1a2e"):"#fff",color:on?(col?"#fff":"#fff"):GR,fontWeight:500}},label);
  }

  return h('div',{style:{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}},
    h('div',{style:{padding:"10px 14px",background:"#fff",borderBottom:"1px solid #e8eaf0",flexShrink:0}},
      h('div',{style:{display:"flex",gap:5,flexWrap:"wrap",marginBottom:7}},
        h('span',{style:{fontSize:10,color:GR,lineHeight:"24px"}},"Pillar:"),
        filterBtn("all",pilFilt,setPilFilt,"All"),
        filterBtn("Acquisition",pilFilt,setPilFilt,"Acquisition","#3b5bdb","#3b5bdb"),
        filterBtn("Operations",pilFilt,setPilFilt,"Operations",AM,AM),
        filterBtn("Delivery",pilFilt,setPilFilt,"Delivery",GN,GN),
        h('span',{style:{fontSize:10,color:GR,lineHeight:"24px",marginLeft:6}},"Type:"),
        filterBtn("all",osFilt,setOsFilt,"All"),
        filterBtn("os",osFilt,setOsFilt,"📱 OS Processes"),
        filterBtn("notion",osFilt,setOsFilt,"📄 Notion SOPs"),
        h('div',{style:{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}},
          h('input',{value:search,onChange:function(e){setSearch(e.target.value);},placeholder:"Search SOPs…",style:{fontSize:11,padding:"4px 9px",borderRadius:6,border:"1px solid #e8eaf0",background:"#f9fafb",color:"#1a1a2e",outline:"none",width:160}}),
          h('a',{href:"https://www.notion.so/28cb5ac429c68011868bf6abc4f214f5",target:"_blank",style:{fontSize:11,padding:"4px 9px",borderRadius:6,border:"1px solid #e8eaf0",background:"#fff",color:BL,fontWeight:500,textDecoration:"none"}},"Notion Master SOP DB →")
        )
      ),
      h('div',{style:{fontSize:11,color:GR}},filtered.length+" of "+SOP_DATA.length+" SOPs")
    ),
    h('div',{style:{flex:1,overflow:"auto",padding:"10px 14px"}},
      ["Acquisition","Operations","Delivery"].filter(function(p){return pilFilt==="all"||pilFilt===p;}).map(function(pillar){
        var sopList=filtered.filter(function(s){return s.pillar===pillar;});
        if(!sopList.length)return null;
        return h('div',{key:pillar,style:{marginBottom:20}},
          h('div',{style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
            h('div',{style:{width:8,height:8,borderRadius:"50%",background:pillarCol[pillar],flexShrink:0}}),
            h('div',{style:{fontSize:13,fontWeight:600,color:"#1a1a2e"}}),
            h('span',{style:{fontSize:13,fontWeight:600,color:"#1a1a2e"}},pillar),
            h('span',{style:{fontSize:11,color:GR}},"— "+sopList.length+" SOPs")
          ),
          h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:8}},
            sopList.map(function(sop,i){
              var pc=pillarCol[sop.pillar],pb=pillarBg[sop.pillar];
              var ownerT=TM[sop.owner];
              return h('div',{key:i,style:{background:"#fff",border:"1px solid #e8eaf0",borderRadius:8,padding:"11px 13px",display:"flex",flexDirection:"column",gap:6,borderLeft:"3px solid "+pc}},
                h('div',{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:6}},
                  h('div',{style:{fontSize:12,fontWeight:500,color:"#1a1a2e",lineHeight:1.4,flex:1}},sop.name),
                  sop.os&&h('span',{style:{fontSize:9,padding:"2px 5px",borderRadius:3,background:"#f3f0ff",color:"#6741d9",fontWeight:500,flexShrink:0}},"OS")
                ),
                h('div',{style:{fontSize:11,color:GR,lineHeight:1.6}},sop.desc),
                h('div',{style:{display:"flex",alignItems:"center",gap:6,marginTop:2}},
                  h('span',{style:{fontSize:9,padding:"2px 6px",borderRadius:3,background:pb,color:pc,fontWeight:500}},sop.pillar),
                  h('span',{style:{fontSize:9,padding:"2px 6px",borderRadius:3,background:"#f5f6fa",color:GR,fontWeight:500}},sop.rel),
                  h('span',{style:{fontSize:9,padding:"2px 6px",borderRadius:3,background:"#f5f6fa",color:GR}},sop.freq),
                  ownerT&&h('div',{style:{marginLeft:"auto",display:"flex",alignItems:"center",gap:4}},
                    h('div',{style:{width:14,height:14,borderRadius:"50%",background:ownerT.bg,border:"1px solid "+ownerT.col,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:500,color:ownerT.col}},ownerT.id),
                    h('span',{style:{fontSize:9,color:GR}},ownerT.name)
                  )
                ),
                h('a',{href:sop.url,target:"_blank",style:{fontSize:10,color:BL,fontWeight:500,textDecoration:"none",marginTop:2}},"Open "+(sop.os?"in Claude.ai →":"in Notion →"))
              );
            })
          )
        );
      })
    )
  );
}

function DailyActionPanel(props){
  var page=props.page;
  var cfg=PANEL_CFG[page];
  if(!cfg)return null;

  var[status,setStatus]=useState("idle"); /* idle | loading | done | error */
  var[output,setOutput]=useState("");
  var[userEdit,setUserEdit]=useState("");
  var[editMode,setEditMode]=useState(false);

  async function runPanel(){
    setStatus("loading");setOutput("");setEditMode(false);
    try{
      var ctx=await cfg.gather();
      var userMsg=cfg.userPrompt(ctx);
      var resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:cfg.systemPrompt,
          messages:[{role:"user",content:userMsg}]
        })
      });
      var data=await resp.json();
      if(data.error){setStatus("error");setOutput("API error: "+data.error.message);return;}
      var text=(data.content||[]).map(function(b){return b.text||"";}).join("");
      setOutput(text);setUserEdit(text);setStatus("done");
